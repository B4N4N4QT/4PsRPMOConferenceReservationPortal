<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
      
      body { 
        font-family: 'Inter', sans-serif; 
        background-color: #000; 
        overflow-x: hidden; 
        min-height: 100vh;
      }
      
      /* --- 3D ANIMATED BACKGROUND --- */
      #bg-viewport {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
      }

      .bg-layer {
        position: absolute;
        inset: -10%;
        width: 120%;
        height: 120%;
        background-size: cover;
        background-position: center;
        transition: opacity 2s ease-in-out;
        filter: brightness(0.5) contrast(1.1); /* Darker for better text readability */
      }

      @keyframes kenBurns {
        0% { transform: scale(1) translate(0, 0); }
        50% { transform: scale(1.1) translate(-1%, 1%); }
        100% { transform: scale(1) translate(0, 0); }
      }

      .animate-3d {
        animation: kenBurns 40s ease-in-out infinite;
      }

      .vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, transparent 10%, rgba(0,0,0,0.6) 100%);
        pointer-events: none;
      }

      /* --- CALENDAR CELL FIXES (Fluid Height) --- */
      .calendar-grid { 
        display: grid; 
        grid-template-columns: repeat(7, 1fr); 
        width: 100%;
        background: #cbd5e1; 
        gap: 1px;
      }
      
      .calendar-day { 
        min-height: 100px; 
        height: auto; 
        background: rgba(255, 255, 255, 0.96); 
        transition: background 0.2s;
        display: flex;
        flex-direction: column;
        padding-bottom: 12px;
      }
      
      @media (min-width: 768px) { 
        .calendar-day { min-height: 160px; } 
      }
      
      .calendar-day:hover { background-color: #ffffff; }
      
      .event-pill { 
        font-size: 0.65rem; 
        padding: 6px 8px; 
        margin: 2px 6px;
        border-radius: 6px; 
        font-weight: 700; 
        white-space: normal; 
        word-wrap: break-word;
        word-break: break-word;
        display: block;
        line-height: 1.3;
        box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      }
      
      .glass-nav { 
        background: rgba(15, 23, 42, 0.85); 
        backdrop-filter: blur(16px); 
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }

      .card-container {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(10px);
      }

      .animate-fade-in { animation: fadeIn 0.4s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      .modal-open { overflow: hidden; }

      /* Custom scrollbar for modal */
      #modal-content::-webkit-scrollbar { width: 6px; }
      #modal-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
  </head>
  <body class="text-slate-800">

    <!-- 3D Background -->
    <div id="bg-viewport">
      <div id="bg1" class="bg-layer animate-3d opacity-100"></div>
      <div id="bg2" class="bg-layer animate-3d opacity-0"></div>
      <div class="vignette"></div>
    </div>

    <div id="toast-container" class="fixed top-5 right-5 z-[200] space-y-3 w-80"></div>

    <!-- Navigation -->
    <nav class="glass-nav text-white shadow-2xl sticky top-0 z-40 p-4">
      <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="switchTab('dashboard')">
          <div class="bg-white p-1.5 rounded-xl">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/9a/4ps-logo.png" alt="Logo" class="h-10">
          </div>
          <div class="hidden sm:block">
            <span class="text-xl font-black block leading-none tracking-tight">4Ps RPMO Conference</span>
            <span class="text-blue-400 text-[10px] uppercase font-bold tracking-[0.2em]">Reservation Portal</span>
          </div>
        </div>

        <div class="flex flex-col items-center">
          <div id="live-time" class="text-2xl font-black tracking-widest leading-none">00:00:00</div>
          <div id="live-date" class="text-[10px] font-bold uppercase tracking-[0.2em] mt-1 text-blue-300">...</div>
        </div>

        <div class="flex items-center space-x-5">
          <div id="sync-indicator" class="hidden text-[10px] font-bold bg-blue-600/50 border border-blue-400 px-4 py-1.5 rounded-full"><i class="fa-solid fa-sync fa-spin mr-2"></i>Syncing</div>
          <button onclick="switchTab('dashboard')" class="text-sm font-bold hover:text-blue-400 transition-colors hidden md:block">Dashboard</button>
          <button onclick="switchTab('request')" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-sm shadow-xl hover:bg-blue-500 transition-all active:scale-95">Request Now</button>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 relative z-10">
      
      <!-- Dashboard -->
      <div id="view-dashboard" class="animate-fade-in space-y-6">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-900/60 p-6 rounded-[2rem] backdrop-blur-xl border border-white/10 shadow-2xl">
          <h2 id="calendar-month-year" class="text-4xl font-black text-white tracking-tighter">Month Year</h2>
          <div class="flex bg-white/10 rounded-2xl p-1.5 border border-white/20">
            <button onclick="changeMonth(-1)" class="p-3 hover:bg-white/20 rounded-xl text-white transition-colors"><i class="fa-solid fa-chevron-left"></i></button>
            <button onclick="goToToday()" class="px-8 py-1 text-xs font-black uppercase text-white tracking-[0.2em]">Today</button>
            <button onclick="changeMonth(1)" class="p-3 hover:bg-white/20 rounded-xl text-white transition-colors"><i class="fa-solid fa-chevron-right"></i></button>
          </div>
        </div>

        <div class="card-container rounded-[2.5rem] shadow-2xl border border-white/20 overflow-hidden bg-white/95">
          <div class="calendar-grid bg-slate-100 border-b text-center text-[11px] font-black text-slate-500 py-5 uppercase tracking-[0.25em]">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
          </div>
          <div id="calendar-days" class="calendar-grid"></div>
        </div>
      </div>

      <!-- Booking Form -->
      <div id="view-request" class="hidden animate-fade-in">
        <div class="max-w-4xl mx-auto card-container rounded-[3rem] overflow-hidden border shadow-2xl">
          <div class="bg-slate-900 p-10 text-white flex justify-between items-center">
            <div>
              <h2 class="text-4xl font-black tracking-tight">Conference Request</h2>
              <p class="text-blue-400 text-xs font-bold uppercase tracking-[0.3em] mt-2">Fill in all required fields</p>
            </div>
            <div class="bg-blue-600/20 p-5 rounded-3xl">
               <i class="fa-solid fa-file-signature text-4xl text-blue-500"></i>
            </div>
          </div>
          
          <form id="reservation-form" onsubmit="handleFormSubmit(event)" class="p-10 md:p-12 space-y-8 bg-white">
            <!-- Personal Info -->
            <div class="space-y-4">
              <h3 class="text-[11px] font-black text-blue-600 uppercase tracking-widest flex items-center gap-2">
                <span class="h-px w-8 bg-blue-600"></span> Personal Information
              </h3>
              <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-1">
                  <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block ml-1">ID Number</label>
                  <input type="text" name="idNumber" required placeholder="00-00000" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                </div>
                <div class="md:col-span-1">
                  <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block ml-1">First Name</label>
                  <input type="text" name="fn" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                </div>
                <div class="md:col-span-1">
                  <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block ml-1">Last Name</label>
                  <input type="text" name="ln" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                </div>
                <div class="md:col-span-1">
                  <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block ml-1">M.I.</label>
                  <input type="text" name="mi" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                </div>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block ml-1">Email Address</label>
                  <input type="email" name="email" required placeholder="example@dswd.gov.ph" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                </div>
                <div>
                  <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block ml-1">Office / Unit</label>
                  <input type="text" name="office" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                </div>
              </div>
            </div>

            <!-- Activity Details -->
            <div class="space-y-4">
              <h3 class="text-[11px] font-black text-blue-600 uppercase tracking-widest flex items-center gap-2">
                <span class="h-px w-8 bg-blue-600"></span> Activity Details
              </h3>
              <input type="text" name="title" required placeholder="Activity Title" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 font-black text-xl">
              
              <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="flex flex-col"><label class="text-[10px] font-black text-slate-400 mb-1 ml-1 uppercase">Start Date</label><input type="date" name="startDate" id="startDate" required class="p-4 bg-slate-50 border rounded-xl text-xs font-bold"></div>
                <div class="flex flex-col"><label class="text-[10px] font-black text-slate-400 mb-1 ml-1 uppercase">End Date</label><input type="date" name="endDate" id="endDate" required class="p-4 bg-slate-50 border rounded-xl text-xs font-bold"></div>
                <div class="flex flex-col"><label class="text-[10px] font-black text-slate-400 mb-1 ml-1 uppercase">Start Time</label><input type="time" name="startTime" required class="p-4 bg-slate-50 border rounded-xl text-xs font-bold"></div>
                <div class="flex flex-col"><label class="text-[10px] font-black text-slate-400 mb-1 ml-1 uppercase">End Time</label><input type="time" name="endTime" required class="p-4 bg-slate-50 border rounded-xl text-xs font-bold"></div>
              </div>
              
              <textarea name="purpose" placeholder="Briefly describe the purpose of this conference..." class="w-full p-5 bg-slate-50 border rounded-2xl h-32 font-medium"></textarea>
            </div>
            
            <button type="submit" id="submit-btn" class="w-full bg-blue-700 text-white font-black py-6 rounded-[2rem] hover:bg-blue-800 transition-all text-xl shadow-2xl uppercase tracking-widest active:scale-[0.98]">Submit Request</button>
          </form>
        </div>
      </div>
    </main>

    <!-- Detailed Modal -->
    <div id="day-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-lg z-[100] hidden items-center justify-center p-4" onclick="if(event.target === this) closeModal()">
      <div class="bg-white rounded-[3rem] w-full max-w-2xl shadow-[0_0_100px_rgba(0,0,0,0.5)] overflow-hidden animate-fade-in" onclick="event.stopPropagation()">
        <div class="p-10 border-b flex justify-between items-center bg-slate-50">
          <div>
            <h3 id="modal-date-title" class="text-3xl font-black text-slate-900 tracking-tighter">Date</h3>
            <p class="text-[11px] font-black text-blue-600 uppercase tracking-[0.3em] mt-2">Daily Schedule Log</p>
          </div>
          <button onclick="closeModal()" class="w-14 h-14 rounded-2xl hover:bg-slate-200 flex items-center justify-center text-slate-500 transition-colors"><i class="fa-solid fa-times text-2xl"></i></button>
        </div>
        <div id="modal-content" class="p-10 space-y-6 max-h-[65vh] overflow-y-auto"></div>
      </div>
    </div>

    <script>
      const wallImages = [
        "https://www.image2url.com/r2/default/images/1777447633113-33bc4d68-15fe-4eef-a504-60a028c0adcf.jpg",
        "https://www.image2url.com/r2/default/images/1777447685264-93781cc0-f33b-4cd1-a0d4-845d86d73360.jpg",
        "https://www.image2url.com/r2/default/images/1777447921531-a464fb97-f71f-42ab-a51d-c2a259875a70.jpg",
        "https://www.image2url.com/r2/default/images/1777447973851-063aa1dc-91c0-4618-bd71-1544e878e91b.jpg"
      ];

      let appData = { reservations: [] };
      let currentCalendarDate = new Date();
      let currentImgIdx = 0;

      window.onload = () => { 
        init3DBackground();
        fetchData();
        startClock();
      };

      function init3DBackground() {
        const b1 = document.getElementById('bg1');
        const b2 = document.getElementById('bg2');
        b1.style.backgroundImage = `url(${wallImages[0]})`;
        
        setInterval(() => {
          currentImgIdx = (currentImgIdx + 1) % wallImages.length;
          const target = (currentImgIdx % 2 === 0) ? b1 : b2;
          const other = (currentImgIdx % 2 === 0) ? b2 : b1;
          
          target.style.backgroundImage = `url(${wallImages[currentImgIdx]})`;
          target.style.opacity = '1';
          other.style.opacity = '0';
        }, 10000);
      }

      function fetchData() {
        document.getElementById('sync-indicator').classList.remove('hidden');
        if (typeof google !== 'undefined') {
          google.script.run.withSuccessHandler(data => {
            appData.reservations = data.reservations || [];
            renderCalendar();
            document.getElementById('sync-indicator').classList.add('hidden');
          }).getAppData();
        } else {
          // Mock data for preview including restored fields
          appData.reservations = [
            { 
              title: "Internal Systems Audit Presentation", 
              start: "2026-04-29", end: "2026-04-29", 
              status: "Approved", 
              startTime: "09:00", endTime: "12:00", 
              office: "ITMS",
              idNumber: "22-10452",
              email: "juan.delacruz@dswd.gov.ph",
              fn: "Juan", ln: "Dela Cruz"
            }
          ];
          renderCalendar();
          document.getElementById('sync-indicator').classList.add('hidden');
        }
      }

      function parseLocalDate(d) {
        if (!d) return null;
        if (d instanceof Date) return new Date(d.getFullYear(), d.getMonth(), d.getDate());
        const parts = String(d).split('-');
        return parts.length === 3 ? new Date(parts[0], parts[1]-1, parts[2]) : null;
      }

      function renderCalendar() {
        const year = currentCalendarDate.getFullYear();
        const month = currentCalendarDate.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const container = document.getElementById('calendar-days');
        
        document.getElementById('calendar-month-year').innerText = new Intl.DateTimeFormat('en-PH', { month: 'long', year: 'numeric' }).format(currentCalendarDate);
        container.innerHTML = '';

        for (let i = 0; i < firstDay; i++) {
          container.innerHTML += `<div class="calendar-day bg-slate-50/40"></div>`;
        }

        for (let day = 1; day <= daysInMonth; day++) {
          const cellDate = new Date(year, month, day);
          const approved = appData.reservations.filter(r => {
            const s = parseLocalDate(r.start);
            const e = parseLocalDate(r.end);
            return s && e && cellDate.getTime() >= s.getTime() && cellDate.getTime() <= e.getTime() && r.status === 'Approved';
          });

          const dayEl = document.createElement('div');
          const isToday = cellDate.toDateString() === new Date().toDateString();
          dayEl.className = `calendar-day cursor-pointer ${isToday ? 'ring-4 ring-inset ring-blue-500 bg-blue-50/80' : ''}`;
          dayEl.onclick = () => showDayDetail(cellDate);
          
          const eventsHtml = approved.map(ev => `
            <div class="event-pill bg-blue-700 text-white shadow-lg">
              ${ev.title}
            </div>
          `).join('');

          dayEl.innerHTML = `
            <div class="p-4 text-[13px] font-black ${isToday ? 'text-blue-700' : 'text-slate-400'}">${day}</div>
            <div class="flex flex-col gap-1 overflow-hidden">${eventsHtml}</div>
          `;
          container.appendChild(dayEl);
        }
      }

      function showDayDetail(date) {
        document.getElementById('modal-date-title').innerText = date.toLocaleDateString('en-PH', { dateStyle: 'full' });
        const events = appData.reservations.filter(r => {
          const s = parseLocalDate(r.start);
          const e = parseLocalDate(r.end);
          return s && e && date.getTime() >= s.getTime() && date.getTime() <= e.getTime();
        });

        document.getElementById('modal-content').innerHTML = events.map(e => `
          <div class="bg-white p-8 rounded-[2rem] border-2 border-slate-100 shadow-sm space-y-6">
            <div class="flex justify-between items-start gap-4">
              <h4 class="font-black text-slate-900 text-xl leading-tight">${e.title}</h4>
              <span class="text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-tighter shrink-0 ${e.status === 'Approved' ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : 'bg-amber-100 text-amber-700 border border-amber-200'}">${e.status}</span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-y-4 gap-x-8 text-xs font-bold">
              <div class="flex items-center gap-3 text-slate-600">
                <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-600"><i class="fa-solid fa-clock"></i></div>
                <div><p class="text-[9px] text-slate-400 uppercase font-black">Time Schedule</p>${e.startTime} - ${e.endTime}</div>
              </div>
              <div class="flex items-center gap-3 text-slate-600">
                <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-600"><i class="fa-solid fa-building"></i></div>
                <div><p class="text-[9px] text-slate-400 uppercase font-black">Office / Unit</p>${e.office}</div>
              </div>
              <div class="flex items-center gap-3 text-slate-600">
                <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-600"><i class="fa-solid fa-id-card"></i></div>
                <div><p class="text-[9px] text-slate-400 uppercase font-black">ID Number / User</p>${e.idNumber || 'N/A'} - ${e.fn} ${e.ln}</div>
              </div>
              <div class="flex items-center gap-3 text-slate-600">
                <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-600"><i class="fa-solid fa-envelope"></i></div>
                <div><p class="text-[9px] text-slate-400 uppercase font-black">Email Address</p>${e.email || 'N/A'}</div>
              </div>
            </div>
            
            ${e.purpose ? `
              <div class="p-5 bg-slate-50 rounded-2xl">
                <p class="text-[9px] text-slate-400 uppercase font-black mb-2">Purpose</p>
                <p class="text-xs text-slate-700 font-medium leading-relaxed">${e.purpose}</p>
              </div>
            ` : ''}
          </div>
        `).join('') || '<div class="text-center py-16"><i class="fa-solid fa-calendar-day text-5xl text-slate-100 mb-4 block"></i><p class="text-slate-400 font-black uppercase text-xs tracking-widest">No reservations found for this date</p></div>';
        
        document.body.classList.add('modal-open');
        document.getElementById('day-modal').classList.replace('hidden', 'flex');
      }

      function handleFormSubmit(e) {
        e.preventDefault();
        const form = e.target;
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "Processing...";
        
        const formData = {
          idNumber: form.idNumber.value,
          email: form.email.value,
          fn: form.fn.value, 
          ln: form.ln.value, 
          mi: form.mi.value,
          office: form.office.value, 
          title: form.title.value, 
          startDate: form.startDate.value,
          endDate: form.endDate.value, 
          startTime: form.startTime.value,
          endTime: form.endTime.value, 
          purpose: form.purpose.value
        };
        
        if (typeof google !== 'undefined') {
          google.script.run
            .withSuccessHandler(() => {
              form.reset();
              switchTab('dashboard');
              fetchData();
              showToast("Reservation Submitted Successfully!", "success");
              btn.disabled = false; btn.innerText = "SUBMIT REQUEST";
            })
            .submitReservation(formData);
        } else {
          setTimeout(() => {
            showToast("Demo Mode: Submitted!", "success");
            switchTab('dashboard');
            btn.disabled = false; btn.innerText = "SUBMIT REQUEST";
          }, 1500);
        }
      }

      function showToast(msg, type) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `p-5 rounded-2xl shadow-2xl text-white font-black text-sm animate-fade-in flex items-center gap-3 ${type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'}`;
        toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${msg}`;
        container.appendChild(toast);
        setTimeout(() => {
          toast.classList.add('opacity-0', 'translate-x-full');
          setTimeout(() => toast.remove(), 500);
        }, 4000);
      }

      function switchTab(t) {
        document.getElementById('view-dashboard').classList.toggle('hidden', t !== 'dashboard');
        document.getElementById('view-request').classList.toggle('hidden', t !== 'request');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function changeMonth(n) { currentCalendarDate.setMonth(currentCalendarDate.getMonth() + n); renderCalendar(); }
      function goToToday() { currentCalendarDate = new Date(); renderCalendar(); }
      function closeModal() { document.getElementById('day-modal').classList.replace('flex', 'hidden'); document.body.classList.remove('modal-open'); }

      function startClock() {
        const tEl = document.getElementById('live-time');
        const dEl = document.getElementById('live-date');
        setInterval(() => {
          const now = new Date();
          tEl.innerText = now.toLocaleTimeString('en-PH', { hour12: true, hour:'2-digit', minute:'2-digit', second:'2-digit'});
          dEl.innerText = now.toLocaleDateString('en-PH', { weekday:'long', month:'short', day:'numeric', year:'numeric'});
        }, 1000);
      }
    </script>
  </body>
</html>
